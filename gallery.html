<!DOCTYPE html>

  <title>Gallery | The Darmesh Brothers</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    .gallery-section {
      padding: 80px 10%;
      background: var(--bg);
    }
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
    }
    .gallery-item {
      border-radius: var(--radius);
      overflow: hidden;
      position: relative;
      aspect-ratio: 1;
      cursor: pointer;
    }
    .gallery-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.4s ease;
      display: block;
    }
    .gallery-item:hover img {
      transform: scale(1.06);
    }
    .gallery-item .overlay {
      position: absolute;
      inset: 0;
      background: rgba(18,10,5,0.5);
      opacity: 0;
      transition: 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
    }
    .gallery-item:hover .overlay {
      opacity: 1;
    }
    .gallery-item.tall {
      aspect-ratio: auto;
      grid-row: span 2;
    }
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      z-index: 9999;
      align-items: center;
      justify-content: center;
    }
    .lightbox.open {
      display: flex;
    }
    .lightbox img {
      max-width: 90vw;
      max-height: 85vh;
      border-radius: 12px;
      object-fit: contain;
    }
    .lightbox-close {
      position: absolute;
      top: 24px;
      right: 30px;
      font-size: 2rem;
      color: white;
      cursor: pointer;
      background: none;
      border: none;
      line-height: 1;
    }
  </style>
</head>

<script src="index.js"></script>
<script>
  function openLightbox(el) {
    const img = el.querySelector("img");
    document.getElementById("lightbox-img").src = img.src;
    document.getElementById("lightbox").classList.add("open");
  }
  function closeLightbox() {
    document.getElementById("lightbox").classList.remove("open");
  }
</script>
